<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Americano Testing</title>
    <link rel="stylesheet" href="./styles/testing.css">
    <script src="./scripts/match_creation.js" defer></script>
</head>
<body>
    <div>
        <form action="">
            <input type="text" id="player-1-input" name="player-1" placeholder="Player 1">
            <input type="text" id="player-2-input" name="player-2" placeholder="Player 2">
            <input type="text" id="player-3-input" name="player-3" placeholder="Player 3">
            <input type="text" id="player-4-input" name="player-4" placeholder="Player 4">
            <input type="text" id="match-display-name" name="match-display-name" placeholder="Match Name">
            <select name="team-creation-engine" id="team-creation-engine-input">
                <option value="manual">Manual</option>
                <option value="random">Random</option>
                <option value="americano" selected>Americano</option>
            </select>
            <select name="points-to-play" id="points-to-play-input">
                <option value="11">11</option>
                <option value="21">21</option>
            </select>
            <button type="submit">Create Match</button>
        </form>
    </div>
</body>
</html>
