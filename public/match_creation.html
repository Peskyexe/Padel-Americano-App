<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/global.css">
    <title>Padel Americano | Match Creation</title>
    <!--  -->
    <link rel="stylesheet" href="./styles/match_creation.css">
    <script src="./scripts/match_creation/match_creation.js" type="module" defer></script>
    <script src="./scripts/match_creation/match_creation_form_validation.js" type="module" defer></script>
    <script src="./scripts/match_creation/dynamic_display_name.js" type="module" defer></script>
    <script src="./scripts/match_creation/dynamic_players_input.js" type="module" defer></script>
    <script src="./scripts/match_creation/dynamic_courts_input.js" type="module" defer></script>
    <!-- Font Awesome icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Dropdown -->
    <link rel="stylesheet" href="./styles/dropdown.css">
    <script src="./scripts/utilities/drop_down.js" defer></script>
    <!-- Slider -->
    <link rel="stylesheet" href="./styles/slider.css">
    <script src="./scripts/utilities/slider.js" type="module" defer></script>
</head>
<body>
    <div class="modal-overlay">
        <div class="match-creation-container">
            <div>
                <h4>Padel Americano</h4>
                <h1>Match Creation</h1>
            </div>
            <form id="match-creation-form" autocomplete="off">
                <div style="grid-area: left;">
                    <div class="player-inputs-container">
                        <label style="grid-area: label;">Players</label>
                        <div class="slider-container" style="grid-area: slider;">
                            <input type="range" class="slider" id="player-amount-input" name="player-amount-input" value="4">
                            <div class="slider-values-container">
                                <span class="slider-min">4</span>
                                <span class="slider-value">4</span>
                                <span class="slider-max">24</span>
                            </div>
                        </div>
                        <div class="player-inputs">
                            <input type="text" id="player-1-input" name="player-1" placeholder="Player 1">
                            <input type="text" id="player-2-input" name="player-2" placeholder="Player 2">
                            <input type="text" id="player-3-input" name="player-3" placeholder="Player 3">
                            <input type="text" id="player-4-input" name="player-4" placeholder="Player 4">
                        </div>
                    </div>
                    <div class="court-amount-input-container">
                        <label>Courts</label>
                        <div class="slider-container disabled">
                            <input type="range" class="slider" id="court-amount-input" name="court-amount-input" min="1" max="1" value="1">
                            <div class="slider-values-container">
                                <span class="slider-min" id="court-slider-min">1</span>
                                <span class="slider-value" id="court-slider-value">2</span>
                                <span class="slider-max" id="court-slider-max">2</span>
                            </div>
                        </div>
                        <span id="court-amount-replacement-text">1</span>
                    </div>
                </div>
                <div style="grid-area: right;">
                    <div>
                        <label for="match-display-name-input">Match name</label>
                        <input type="text" id="match-display-name-input" name="match-display-name-input" placeholder="Match name">
                    </div>
                    <div>
                        <label>Team algorithm</label>
                        <div class="dropdown-wrapper" id="team-algorithm-input">
                            <div class="dropdown-button">
                                <span class="dropdown-selected-item">Algorithm</span>
                                <span><i class="fa-solid fa-caret-up"></i></span>
                            </div>
                            <div class="dropdown-menu">
                                <div class="dropdown-item dropdown-active">Americano</div>
                                <div class="dropdown-item">Random</div>
                                <div class="dropdown-item">Manual</div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label>Points</label>
                        <div class="dropdown-wrapper" id="points-to-play-input">
                            <div class="dropdown-button">
                                <span class="dropdown-selected-item">Best of</span>
                                <span><i class="fa-solid fa-caret-up"></i></span>
                            </div>
                            <div class="dropdown-menu">
                                <div class="dropdown-item dropdown-active">Best of 11</div>
                                <div class="dropdown-item">Best of 21</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="match-creation-buttons" style="grid-area: buttons;">
                    <div>
                        <button type="submit" id="match-create-button">Create Match</button>
                    </div>
                    <div>
                        <button type="reset" id="match-cancel-button">Cancel</button>
                    </div>
                </div>
                <span id="error-text" style="grid-area: error-text;"></span>
            </form>
        </div>
    </div>
</body>
</html>
