# ═══════════════════════════════════════════════════════════════
# Hiamp Production Compose - Two-Image Separation Pattern
# ═══════════════════════════════════════════════════════════════
# Brukes på produksjonsserver med Watchtower for auto-updates
# Basert på MIGRATOR_DESIGN.md arkitektur

networks:
  internal_internal:
    external: true
  hiamp:
    driver: bridge

services:
  # ─────────────────────────────────────────────────────────────
  # Migrator Service - Dedikert for Prisma migrations
  # ─────────────────────────────────────────────────────────────
  # Kjører kontinuerlig og utfører migrations ved Watchtower updates
  # Healthcheck sikrer migrations ved første deploy
  migrator:
    image: ghcr.io/guttasas/hiamp-migrate:latest
    container_name: hiamp_migrator
    restart: unless-stopped
    networks:
      - hiamp
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@hiamp_db:5432/${DB_NAME}
    depends_on:
      hiamp_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "prisma migrate deploy || exit 1"]
      interval: 24h
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.lifecycle.post-update=prisma migrate deploy"
    # Keep container alive - migrations run via Watchtower hooks
    command: sleep infinity

  # ─────────────────────────────────────────────────────────────
  # WebApp Service - Next.js Runtime
  # ─────────────────────────────────────────────────────────────
  webapp:
    image: ghcr.io/guttasas/hiamp:latest
    deploy:
      replicas: 2  # Multiple replicas for High Availability
    restart: unless-stopped
    networks:
      - internal_internal
      - hiamp
    environment:
      # Runtime environment variables
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@hiamp_db:5432/${DB_NAME}
      - BETTER_AUTH_URL=https://hiamp.no
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      # SMTP (Domeneshop)
      - SMTP_HOST=${SMTP_HOST:-smtp.domeneshop.no}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_FROM=${SMTP_FROM}
      # S3 / Cloudflare R2
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-auto}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL:-}
    depends_on:
      hiamp_db:
        condition: service_healthy
      migrator:
        condition: service_started
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal_internal"
      - "traefik.http.routers.hiamp.rule=Host(`hiamp.no`) && PathPrefix(`/`)"
      - "traefik.http.routers.hiamp.entrypoints=web"
      - "traefik.http.services.hiamp.loadbalancer.server.port=3000"
      - "traefik.http.services.hiamp.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.hiamp.loadbalancer.sticky.cookie.name=hiamp_sticky"
      - "traefik.http.services.hiamp.loadbalancer.sticky.cookie.httpOnly=true"
      - "traefik.http.services.hiamp.loadbalancer.sticky.cookie.secure=true"
      - "com.centurylinklabs.watchtower.enable=true"

  # ─────────────────────────────────────────────────────────────
  # Database Service - PostgreSQL
  # ─────────────────────────────────────────────────────────────
  hiamp_db:
    image: postgres:16-alpine
    container_name: hiamp_db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
    volumes:
      - hiamp_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hiamp

volumes:
  hiamp_db_data:
